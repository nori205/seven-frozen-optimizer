<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>セブン冷食 最適購入計算機</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: white;
      padding: 18px 16px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header h1 { font-size: 17px; font-weight: bold; letter-spacing: 0.5px; }
    header p  { font-size: 11px; margin-top: 3px; opacity: 0.85; }

    .campaign-box {
      margin: 14px 14px 0;
      background: #fffbe6;
      border: 1px solid #ffe08a;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .campaign-box h3 {
      font-size: 13px;
      font-weight: bold;
      color: #7d5a00;
      margin-bottom: 6px;
    }
    .campaign-box p {
      font-size: 13px;
      color: #5a4000;
      line-height: 1.6;
    }
    .campaign-box p + p { margin-top: 2px; }

    .section { margin: 14px; }
    .section-label {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    /* ---- Product card ---- */
    .product-card {
      background: white;
      border-radius: 10px;
      padding: 12px 12px 10px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .card-header input[type="text"] {
      flex: 1;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 7px 10px;
      background: #fafafa;
    }
    .card-header input[type="text"]:focus {
      outline: none;
      border-color: #e74c3c;
      background: white;
    }
    .btn-delete {
      background: #e0e0e0;
      color: #555;
      border: none;
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-delete:active { background: #f5c6cb; color: #c0392b; }

    .card-fields {
      display: flex;
      gap: 10px;
    }
    .field-wrap { flex: 1; }
    .field-wrap label {
      display: block;
      font-size: 11px;
      color: #777;
      margin-bottom: 4px;
    }
    .field-wrap input[type="number"] {
      width: 100%;
      font-size: 17px;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 8px 10px;
      background: #fafafa;
      -moz-appearance: textfield;
    }
    .field-wrap input[type="number"]::-webkit-outer-spin-button,
    .field-wrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field-wrap input[type="number"]:focus {
      outline: none;
      border-color: #e74c3c;
      background: white;
    }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      background: white;
      color: #27ae60;
      border: 2px dashed #27ae60;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 14px;
    }
    .btn-add:active { background: #eafaf1; }

    .btn-calc {
      width: 100%;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 17px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 3px 10px rgba(231,76,60,0.4);
    }
    .btn-calc:active { opacity: 0.85; transform: scale(0.99); }

    /* ---- Result ---- */
    .result-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.13);
    }
    .result-heading {
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      color: #c0392b;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f9e8e7;
    }

    .combo-table {
      background: #fafafa;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid #eee;
    }
    .combo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .combo-row:last-child { border-bottom: none; }
    .combo-row.total-row {
      background: #f0f2f5;
      font-weight: bold;
      font-size: 14px;
    }
    .combo-name { color: #333; font-weight: bold; }
    .combo-detail { color: #555; text-align: right; line-height: 1.4; }

    .summary { margin-top: 4px; }
    .sum-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-row .label { color: #555; }
    .sum-row .value { font-weight: bold; }
    .sum-row.discount .value { color: #27ae60; }
    .sum-row.after  { padding: 12px 0; }
    .sum-row.after .label { font-size: 16px; font-weight: bold; color: #222; }
    .sum-row.after .value { font-size: 22px; font-weight: bold; color: #c0392b; }
    .sum-row.lottery .label { color: #1a5eb8; font-weight: bold; }
    .sum-row.lottery .value { color: #1a5eb8; font-size: 18px; }
    .sum-row.over   .label { color: #aaa; font-size: 13px; }
    .sum-row.over   .value { color: #aaa; font-size: 13px; }

    .no-result {
      text-align: center;
      padding: 24px 10px;
      color: #888;
      font-size: 14px;
      line-height: 1.7;
    }
    .spinner {
      text-align: center;
      padding: 28px;
      font-size: 14px;
      color: #888;
    }
    .err-box {
      background: #fdf2f2;
      border: 1px solid #f5c6cb;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <h1>セブンイレブン 冷食キャンペーン 最適購入計算機</h1>
  <p>2つのキャンペーンを最大活用できる組み合わせを自動計算</p>
</header>

<div class="campaign-box">
  <h3>▼ 適用キャンペーン</h3>
  <p>① 冷凍食品 <strong>3点ごとに200円引き</strong>（何セットでも適用）</p>
  <p>② 1会計 <strong>1,000円以上</strong> でくじ1枚（何円でも1回のみ）</p>
</div>

<div class="section">
  <div class="section-label">商品リスト</div>
  <div id="product-list"></div>
  <button class="btn-add" onclick="addProduct()">＋ 商品を追加</button>
  <button class="btn-calc" onclick="onCalculate()">最適な購入組み合わせを計算</button>
</div>

<div id="result-section" class="section"></div>

<script>
// -------- State --------
let products  = [];
let idCounter = 0;
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// -------- Product management --------
function addProduct() {
  products.push({ id: idCounter++, name: '', price: '', stock: '' });
  renderProducts();
}

function removeProduct(id) {
  products = products.filter(p => p.id !== id);
  renderProducts();
}

function updateField(id, field, value) {
  const p = products.find(p => p.id === id);
  if (p) p[field] = value;
}

function displayName(p, idx) {
  return p.name.trim() || ('商品' + (LETTERS[idx] || (idx + 1)));
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderProducts() {
  const list = document.getElementById('product-list');
  list.innerHTML = products.map((p, idx) => `
    <div class="product-card">
      <div class="card-header">
        <input type="text" placeholder="${esc('商品' + (LETTERS[idx] || (idx+1)))}"
               value="${esc(p.name)}"
               oninput="updateField(${p.id},'name',this.value)">
        <button class="btn-delete" onclick="removeProduct(${p.id})">✕</button>
      </div>
      <div class="card-fields">
        <div class="field-wrap">
          <label>価格（円）</label>
          <input type="number" inputmode="numeric" min="1" placeholder="例: 298"
                 value="${esc(p.price)}"
                 oninput="updateField(${p.id},'price',this.value)">
        </div>
        <div class="field-wrap">
          <label>在庫数（点）</label>
          <input type="number" inputmode="numeric" min="1" placeholder="例: 5"
                 value="${esc(p.stock)}"
                 oninput="updateField(${p.id},'stock',this.value)">
        </div>
      </div>
    </div>
  `).join('');
}

// -------- Validation --------
function validate() {
  if (products.length === 0) return '商品を1つ以上追加してください。';
  for (let i = 0; i < products.length; i++) {
    const p   = products[i];
    const pr  = parseInt(p.price);
    const st  = parseInt(p.stock);
    const nm  = displayName(p, i);
    if (!p.price.toString().trim() || isNaN(pr) || pr < 1)
      return nm + ' の価格（1以上の整数）を入力してください。';
    if (!p.stock.toString().trim() || isNaN(st) || st < 1)
      return nm + ' の在庫数（1以上の整数）を入力してください。';
  }
  return null;
}

// -------- Algorithm --------
// くじは1会計につき1枚のみ（金額不問）
// Objective: afterDiscount >= 1000 を満たしつつ afterDiscount を最小化
//   afterDiscount = totalPrice - floor(totalItems/3)*200
//   overshoot     = afterDiscount - 1000  （1000円超過分）

function solve(prods) {
  const n     = prods.length;
  const combo = new Int32Array(n);
  let best    = null;

  // Precompute max total items to bound search
  const maxItems = Math.min(prods.reduce((s, p) => s + p.stock, 0), 30);

  function recurse(idx, items, price) {
    if (idx === n) {
      if (items === 0) return;
      const discount      = Math.floor(items / 3) * 200;
      const afterDiscount = price - discount;
      if (afterDiscount < 1000) return;
      // 最小化: afterDiscount（= 1000円超過分も自動的に最小）
      if (best === null || afterDiscount < best.afterDiscount) {
        best = {
          combo:        Int32Array.from(combo),
          totalItems:   items,
          totalPrice:   price,
          discount,
          afterDiscount,
          overshoot:    afterDiscount - 1000,
          lottery:      1
        };
      }
      return;
    }

    const { price: unitPrice, stock } = prods[idx];
    const maxQty = Math.min(stock, maxItems - items);

    for (let q = 0; q <= maxQty; q++) {
      combo[idx] = q;
      recurse(idx + 1, items + q, price + q * unitPrice);
    }
    combo[idx] = 0;
  }

  recurse(0, 0, 0);
  return best;
}

// -------- UI handlers --------
function onCalculate() {
  const rs  = document.getElementById('result-section');
  const err = validate();
  if (err) { rs.innerHTML = `<div class="err-box">${esc(err)}</div>`; return; }

  const prods = products.map((p, i) => ({
    name:  displayName(p, i),
    price: parseInt(p.price),
    stock: Math.min(parseInt(p.stock), 30)
  }));

  // Estimate search size
  const combCount = prods.reduce((a, p) => a * (p.stock + 1), 1);

  rs.innerHTML = '<div class="spinner">計算中…</div>';

  // Defer to let the DOM repaint
  setTimeout(() => {
    // If too large, cap stocks and warn
    let warning = '';
    if (combCount > 8_000_000) {
      // apply cap so search finishes quickly
      prods.forEach(p => { p.stock = Math.min(p.stock, 6); });
      warning = '在庫数が多いため、各商品の探索上限を6点に絞って計算しました。';
    }

    const result = solve(prods);
    renderResult(result, prods, warning);
  }, 30);
}

function renderResult(result, prods, warning) {
  const rs = document.getElementById('result-section');

  if (!result) {
    rs.innerHTML = `
      <div class="result-card">
        <div class="no-result">
          条件を満たす購入組み合わせが見つかりませんでした。<br>
          在庫数を増やすか、価格をご確認ください。
        </div>
      </div>`;
    return;
  }

  const bought = Array.from(result.combo)
    .map((qty, i) => ({ qty, prod: prods[i] }))
    .filter(x => x.qty > 0);

  const comboRows = bought.map(x => `
    <div class="combo-row">
      <span class="combo-name">${esc(x.prod.name)}</span>
      <span class="combo-detail">
        ${x.qty}点<br>
        <small>${x.prod.price.toLocaleString()}円 × ${x.qty} = ${(x.prod.price * x.qty).toLocaleString()}円</small>
      </span>
    </div>
  `).join('');

  const sets = Math.floor(result.totalItems / 3);

  rs.innerHTML = `
    <div class="result-card">
      ${warning ? `<div class="err-box" style="margin-bottom:12px;font-size:13px;">${esc(warning)}</div>` : ''}
      <div class="result-heading">最適な購入組み合わせ</div>

      <div class="combo-table">
        ${comboRows}
        <div class="combo-row total-row">
          <span>合計</span>
          <span>${result.totalItems}点</span>
        </div>
      </div>

      <div class="summary">
        <div class="sum-row">
          <span class="label">定価合計</span>
          <span class="value">${result.totalPrice.toLocaleString()}円</span>
        </div>
        <div class="sum-row discount">
          <span class="label">割引額（${sets}セット × 200円）</span>
          <span class="value">－${result.discount.toLocaleString()}円</span>
        </div>
        <div class="sum-row after">
          <span class="label">割引後合計</span>
          <span class="value">${result.afterDiscount.toLocaleString()}円</span>
        </div>
        <div class="sum-row lottery">
          <span class="label">🎟 くじ枚数</span>
          <span class="value">${result.lottery}枚</span>
        </div>
        <div class="sum-row over">
          <span class="label">1,000円超過分（はみ出し）</span>
          <span class="value">＋${result.overshoot.toLocaleString()}円</span>
        </div>
      </div>
    </div>`;
}

// -------- Init --------
addProduct();
addProduct();
addProduct();
</script>
</body>
</html>
